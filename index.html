<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agency Clone</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>

<body>

    <header>
        <nav>
            <h2>Gerazon</h2>
            <ul>
                <li>Home</li>
                <li><a href="contact.html">Contact</li></a>
            </ul>
        </nav>
    </header>

    <section class="hero">
        <h1>We Build Modern Websites</h1>
        <p>Clean, fast and scalable solutions</p>
        <div class="hero-images">
            <img src="Image/py.jpg" class="img img1">
            <img src="Image/js.jpg" class="img img2">
            <img src="Image/html.jpg" class="img img3">
        </div>
        <button>Get Started</button>
    </section>

    <section class="services">
        <h2>Our Services</h2>
        <div class="cards">
            <div class="card">
                <img src="Image/web.jpg" alt="1">
                <div class="card-text">Web Development</div>
            </div>
            <div class="card">
                <img src="Image/A5.jpg" alt="2">
                <div class="card-text">UI/UX</div>
            </div>
            <div class="card">
                <img src="Image/iPhone 16.png" alt="2">
                <div class="card-text">Graphic Designing</div>
            </div>

        </div>
        </div>

    </section>



    <footer>
        <p>© 2026 Gerazon Design Agency</p>
    </footer>
    <script>
        window.addEventListener("scroll", () => {
            document.querySelectorAll(".card").forEach(card => {
                card.style.transform = "translateY(0)";
                card.style.opacity = "1";
            });
        });
    </script>
    <style>
        a {
            text-decoration: none;
            color: #eee;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            line-height: 1.6;
        }

        header {
            background: #111;
            color: white;
            padding: 15px 50px;
        }

        nav {
            display: flex;
            justify-content: space-between;
        }

        .hero {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 50px;
            height: 100vh;
            background: #0f0f0f;
            color: white;
        }

        .hero-text {
            max-width: 50%;
        }

        .hero-images {
            position: relative;
            width: 400px;
            height: 400px;
        }

        /* Base image style */
        .img {
            position: absolute;
            width: 180px;
            border-radius: 10px;
            animation: float 4s ease-in-out infinite;
        }

        /* Media Queries for Android phones */
        @media (max-width: 480px) {
            header {
                padding: 15px 20px;
            }

            nav {
                flex-direction: column;
                align-items: center;
            }

            .hero {
                flex-direction: column;
                padding: 30px 20px;
                height: auto;
                text-align: center;
            }

            .hero-text {
                max-width: 100%;
            }

            .hero-images {
                margin-top: 30px;
                width: 300px;
                height: 300px;
            }

            .img {
                width: 120px;
            }

            .img1 {
                top: 0;
                left: 30px;
            }

            .img2 {
                top: 80px;
                left: 100px;
            }

            .img3 {
                top: 160px;
                left: 0;
            }

            .hero h1 {
                font-size: 2rem;
            }

            .services {
                padding: 30px 20px;
            }



            .contact {
                padding: 30px 20px;
            }

            form {
                max-width: 100%;
            }
        }

        .img1 {
            top: 0;
            left: 50px;
        }

        .img2 {
            top: 120px;
            left: 150px;
        }

        .img3 {
            top: 220px;
            left: 0;
        }

        footer {
            padding: 30px;
            background-color: #111;
            text-align: center;
            color: #eee;
        }

        /* Floating animation */
        @keyframes float {
            0% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-15px);
            }

            100% {
                transform: translateY(0px);
            }
        }

        .hero h1 {
            font-size: 3rem;
        }

        .hero button {
            margin-top: 20px;
            padding: 12px 20px;
            border: none;
            background: #ff4c60;
            color: white;
            cursor: pointer;
        }

        .services {
            padding: 50px;
            text-align: center;
        }

        .card {
            position: relative;
            width: 300px;
            height: 200px;
            border-radius: 10px;
            overflow: hidden;
        }

        .cards {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-text {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            padding: 10px;
            color: #341194;
            text-align: center;
            font-weight: bold;
        }


        .contact {
            padding: 50px;
            background: #eee;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-width: 400px;
        }

        input,
        textarea {
            padding: 10px;
        }

        button {
            background: #000;
            color: white;
            padding: 10px;
        }
    </style>

</body>

</html>
